packages:
  atoms3_lite: !include configs/c6.yaml
  static_ip: !include configs/static-ip.yaml

substitutions:
  friendly_name: Bedometer
  ip_address: 10.1.1.213
  name: bedometer
  threshold: 1.75

.binary_sensor:
  - &base_occupancy_sensor
    device_class: occupancy
    filters:
      - delayed_off: 10s
    platform: template

binary_sensor:
  - !!merge <<: *base_occupancy_sensor
    id: bed_left_occupancy
    lambda: return id(bed_left_pressure).state > $threshold;
    name: Bed Left Occupancy
  - !!merge <<: *base_occupancy_sensor
    id: bed_right_occupancy
    lambda: return id(bed_right_pressure).state > $threshold;
    name: Bed Right Occupancy
  - !!merge <<: *base_occupancy_sensor
    filters:
      - delayed_off: 0s
    id: bed_occupancy
    lambda: return id(bed_left_occupancy).state || id(bed_right_occupancy).state;
    name: Bed Occupancy

.sensor:
  - &base_pressure_sensor
    entity_category: diagnostic
    filters:
      - lambda: |-
          if (x > 2.0) return 3.0;
          if (x < 1.5) return 0.0;
          return x;
      - or:
          - heartbeat: 1min
          - delta: 0.1
    attenuation: 12db
    platform: adc
    update_interval: 1s

sensor:
  - !!merge <<: *base_pressure_sensor
    id: bed_left_pressure
    pin: GPIO0
    name: Left
  - !!merge <<: *base_pressure_sensor
    id: bed_right_pressure
    pin: GPIO1
    name: Right
